    <script>
      window.__CUI_BASE__ = '/';
      window.__CUI_EMBED__ = '';
      (function () {
        try {
          var forced = new URLSearchParams(window.location.search).get('cui_theme');
          var mode;
          if (forced === 'dark' || forced === 'light') {
            mode = forced;
          } else {
            var raw = localStorage.getItem('theme');
            var obj = raw ? JSON.parse(raw) : { theme: 'dark', autoMode: true };
            mode = obj.autoMode ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : obj.theme;
          }
          var el = document.documentElement;
          el.setAttribute('data-mode', mode);
          el.classList.add(mode === 'dark' ? 'dark-mode' : 'light-mode');
          el.style.background = mode === 'dark' ? '#0d0d0d' : '#f8fafc';
        } catch (e) {}
      })();
    </script>
