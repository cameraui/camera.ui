title: '[Support Request]: '
labels: [help wanted, question, support request]
body:
  - type: markdown
    attributes:
      value: |
        Hi. Before you start filling out this form be aware of the following points:
        - Review our **Troubleshooting** and **FAQ** pages in the Wiki to ensure your issue isn't already solved by those steps.
        - Search through **existing discussions** which might provide a solution to your problem already.

  - type: input
    attributes:
      label: Describe Your Problem
      placeholder: A clear and concise description of what problem you are trying to solve.
    validations:
      required: true
  - type: textarea
    id: Logs
    attributes:
      label: Relevant log output
      placeholder: Bug reports that do not contain logs may be closed without warning. Show the camera.ui logs here. Remove any sensitive information. Please Turn on Debug Mode before submitting your Issue so more logs can be shared to fix the issue being submitted.
      render: shell
    validations:
      required: false
  - type: textarea
    id: Config
    attributes:
      label: Config for camera.ui
      placeholder: Paste your camera.ui config.yml here. Remove any sensitive information.
      render: shell
    validations:
      required: false
  - type: textarea
    id: go2rtc
    attributes:
      label: Config for go2rtc
      placeholder: Paste your go2rtc config.yml here. Remove any sensitive information.
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Screenshots
      description: If applicable add screenshots to help explain your problem.
      placeholder: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Environment
  - type: input
    attributes:
      label: Node.js Version
      placeholder: v18.18.0
    validations:
      required: true
  - type: input
    attributes:
      label: NPM Version
      placeholder: v7.22.0
    validations:
      required: true
  - type: input
    attributes:
      label: camera.ui Version
      placeholder: v1.3.4
    validations:
      required: true
  - type: input
    attributes:
      label: Operating System
      placeholder: Raspbian / Ubuntu / Debian / Windows / macOS / Docker
    validations:
      required: true
